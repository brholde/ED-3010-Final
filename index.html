<html lang="en" data-bs-theme="dark">
<head>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
	<!-- nav stuffs -->
	<div id="navbar"></div>
	<script>
		fetch("navbar.html")
		.then(res => res.text())
		.then(data => {
			document.getElementById("navbar").innerHTML = data;
			const links = document.querySelectorAll(".nav-link");
			const currentPage = window.location.pathname.split("/").pop();

			links.forEach(link => {
				if (link.getAttribute("href") === currentPage) {
					link.classList.add("active");
				}
			});
		});
	</script>

	<!-- content -->
	<div class="card text-bg-dark text-center text-dark mt-2">
		<img src="https://gsep.pepperdine.edu/blog/images/integrating-technology-in-the-classroom-for-2025.jpg" class="card-img object-fit-cover" alt="classroom with students using laptops" style="filter: blur(5px); max-height: 91vh">
		<div class="card-img-overlay align-middle d-flex align-items-center justify-content-center">
			<div class="bg-light opacity-75 rounded p-1 d-inline-block px-5 pb-4">
				<h1 class="display-1 my-3">ED 3010 Final</h1>
				<h1 class="mb-1">Device Montitoring Software In American Schools</h1>
				<p class="fw-5">Created by: Benjamin Holden</h4>
				<p class="fs-5">
				Use the tabs above to navigate to the different sections of this site.
				</p>
				<small>Background Image - (Graduate Programs in Education and Psychology - Pepperdine University, 2026)</small>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
